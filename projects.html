<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .projects.page-layout {
            padding-top: 120px;
            min-height: 80vh;
        }
    </style>
</head>

<body>
    <div class="page-noise"></div>
    <div class="cursor-glow"></div>

    <nav class="site-nav">
        <a href="index.html" class="logo">Rachit<span>Kanchan</span></a>

            <button id="theme-toggle" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" aria-label="Toggle Theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon" style="display: none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun-icon">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>

                </svg>
            </button>
        </div>
    </nav>

    <main>
        <section id="projects" class="section projects page-layout">
            <div class="section-heading reveal" style="text-align: center; margin-bottom: 4rem;">
                <span class="section-kicker">Projects</span>
                <h2 style="font-size: 3rem; margin-top: 1rem;">All My Projects</h2>
                <div style="margin-top: 2rem;">
                    <a href="index.html" class="btn btn-secondary">← Back to Portfolio</a>
                </div>
            </div>
            
            <div class="project-grid">
                <!-- Projects will be rendered dynamically here -->
            </div>
        </section>

        <section id="contact" class="section contact">
            <div class="contact-card reveal">
                <span class="section-kicker">Contact</span>
                <h2>Get in touch</h2>
                <p>If you want to talk about internships, projects, or collaboration, feel free to contact me.</p>
                <p class="contact-email">Email: <a href="mailto:rachkanc@gmail.com">rachkanc@gmail.com</a></p>
                <div class="contact-actions">
                    <a href="mailto:rachkanc@gmail.com" class="btn btn-primary">Open Email App</a>
                    <button type="button" class="btn btn-secondary copy-email-btn" data-email="rachkanc@gmail.com">Copy
                        Email</button>
                    <a href="https://github.com/rach-kanc" class="btn btn-secondary" target="_blank"
                        rel="noopener noreferrer">GitHub</a>
                    <a href="https://www.linkedin.com/in/rachitkanchan/" class="btn btn-secondary" target="_blank"
                        rel="noopener noreferrer">LinkedIn</a>
                    <a href="#" class="btn btn-secondary">Back to Top</a>
                </div>
            </div>
        </section>
    </main>

    <div id="project-overlay" class="overlay hidden" aria-hidden="true">
        <div class="overlay-backdrop" data-close="true"></div>
        <div class="overlay-content" role="dialog" aria-modal="true" aria-labelledby="project-title">
            <button class="close-btn" type="button" aria-label="Close project details">&times;</button>
            <div id="project-details"></div>
        </div>
    </div>

    <script type="module" src="assets/js/render.js"></script>
    <script type="module" src="assets/js/script.js"></script>
    <script type="module" src="assets/js/analytics.js"></script>
